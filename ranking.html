<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHUNITHMスコア一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- トークン入力画面 -->
  <div id="token-screen">
    <h1>🎵 CHUNITHM スコア一覧</h1>
    <p>
      chunirecのアクセストークンを入力してください。<br>
      トークンは <a href="https://developer.chunirec.net/" target="_blank">developer.chunirec.net</a> から取得できます。<br>
      <small style="color:#666;">トークンはこのサイトには保存されません。</small>
    </p>
    <input type="text" id="token-input" placeholder="アクセストークンを入力...">
    <br>
    <button onclick="loadScores()">スコアを表示</button>
    <p id="token-error" style="color:#ff6666; display:none;">トークンが正しくありません。もう一度確認してください。</p>
  </div>

  <!-- スコア表示画面 -->
  <div id="main-screen">
    <h1>🎵 CHUNITHM スコア一覧</h1>
    <div class="filters">
      <div class="filter-group">
        <label>譜面定数：</label>
        <div>
        <input type="number" id="const-min" inputmode="decimal" step="0.1" placeholder="最小"> 
        〜 
        <input type="number" id="const-max" inputmode="decimal" step="0.1" placeholder="最大">
        </div>
      </div>

      <div class="filter-group">
       <label>スコア：</label>
       <div>
       <input type="number" id="score-min" inputmode="decimal" placeholder="最小"> 
       〜 
       <input type="number" id="score-max" inputmode="decimal" placeholder="最大">
       </div>
      </div>

      <div class="filter-group">
      <label>ランプ：</label>
      <select id="lamp-filter">
       <option value="">すべて</option>
       <option value="AJC">AJCのみ</option>
       <option value="AJ">AJ</option>
       <option value="NO_AJ">AJ未達成</option>
      </select>
      </div>

      <div class="filter-group">
       <label>Rating：</label>
       <div>
       <input type="number" id="rating-min" inputmode="decimal" step="0.01" placeholder="最小"> 
       〜 
       <input type="number" id="rating-max" inputmode="decimal" step="0.01" placeholder="最大">
       </div>
      </div>

      <div class="filter-group">
        <label>難易度：</label>
        <select id="diff-filter">
          <option value="">すべて</option>
          <option value="ULT">ULTIMA</option>
          <option value="MAS">MASTER</option>
          <option value="EXP">EXPERT</option>
          <option value="ADV">ADVANCED</option>
          <option value="BAS">BASIC</option>  
        </select>
      </div>

      <div class="filter-group">
      <label>曲名検索</label>
      <input type="text" id="search-input" placeholder="曲名を入力...">
      </div>

      <div class="filter-group">
      <label>並び替え：</label>
      <select id="sort-order">
      <option value="score-desc">スコアが高い順</option>
      <option value="rating-desc">Ratingが高い順</option>
      </select>
      </div>

    </div>

  <div id="restore-buttons" style="margin-bottom: 10px; min-height: 30px;">
  </div>

<div class="table-container">
<table id="main-table">
  <thead>
    <tr>
      <th onclick="hideColumn(0)" style="cursor: pointer;" title="クリックで非表示">#</th>
      <th onclick="hideColumn(1)" style="cursor: pointer;" title="クリックで非表示">曲名</th>
      <th onclick="hideColumn(2)" style="cursor: pointer;" title="クリックで非表示">難易度</th>
      <th onclick="hideColumn(3)" style="cursor: pointer;" title="クリックで非表示">スコア</th>
      <th onclick="hideColumn(4)" style="cursor: pointer;" title="クリックで非表示">Rating</th>
    </tr>
  </thead>
  <tbody id="score-table">
    </tbody>
</table>
</div>

</div>

  <script src="script.js"></script>
</body>
</html>
